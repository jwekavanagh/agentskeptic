# Setup Node 22, npm cache, and npm ci at the repository root. Does not run checkout
# (keeps CodeQL and other jobs free to run grep/validation before or after install).
name: "Setup Node + npm ci"
description: "Node 22, npm cache, and npm ci (no checkout; compose after actions/checkout in workflows)"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: "22"
        cache: npm
    - run: npm ci
      shell: bash
