# Example: stateless truth check (OSS) with the published CLI — no AGENTSKEPTIC_API_KEY or license server.
#
# Default low-friction CI: Outcome Certificate on stdout, truth_check_verdict on stderr (see docs/integrate.md).
# For opt-in commercial/stateful baseline enforcement and drift detection, see agentskeptic-commercial.yml.
#
# Copy to .github/workflows/ in a repo that vendors the same examples/ layout (events.ndjson, tools.json, seed.sql), or run from this monorepo.
#
# Ambient discovery job summary: uses scripts/render-discovery-ci.mjs from the installed package; contract details in docs/ambient-ci-distribution.md
name: AgentSkeptic Truth Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  truth-check:
    runs-on: ubuntu-latest
    env:
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create examples/demo.db from seed.sql
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install published agentskeptic
        run: npm install agentskeptic@latest

      - name: Run stateless truth check
        id: agentskeptic_check
        shell: bash
        run: |
          set +e
          npx agentskeptic check \
            --workflow-id wf_complete \
            --events examples/events.ndjson \
            --registry examples/tools.json \
            --db examples/demo.db \
            > verify.stdout 2> verify.stderr
          status=$?

          {
            echo "## AgentSkeptic truth check"
            echo ""
            echo "### Captured stderr"
            echo ""
            echo '```text'
            cat verify.stderr || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          cat verify.stderr >&2 || true
          cat verify.stdout || true

          exit "$status"

      - name: Append AgentSkeptic discovery summary
        if: always()
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"
